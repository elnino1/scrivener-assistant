name: Release

on:
  workflow_run:
    workflows: [ "Test" ]
    types: [ completed ]
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build, Tag, and Release
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Inject version into package files
        run: |
          VERSION=${{ steps.tag_version.outputs.new_version }}
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          python3 -c "
          import json, sys
          with open('manifest.json') as f: d = json.load(f)
          d['version'] = sys.argv[1]
          with open('manifest.json', 'w') as f: json.dump(d, f, indent=2)
          " "$VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Pack Desktop Extension
        run: mcpb pack . scrivener-assistant-${{ steps.tag_version.outputs.new_version }}.mcpb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          files: |
            scrivener-assistant-*.mcpb
            dist/*.whl
            dist/*.tar.gz
